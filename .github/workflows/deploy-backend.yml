name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      LAMBDA_NAME: op-investing-guru-api
      STOCKS_TABLE: InvestingGuru-Stocks
      OPTIONS_TABLE: InvestingGuru-Options
      API_NAME: op-investing-guru-api-gw

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create DynamoDB tables if not exist
        run: |
          aws dynamodb describe-table --table-name $STOCKS_TABLE --region $AWS_REGION 2>/dev/null || \
          aws dynamodb create-table \
            --table-name $STOCKS_TABLE \
            --attribute-definitions AttributeName=ticker,AttributeType=S \
            --key-schema AttributeName=ticker,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $AWS_REGION

          aws dynamodb describe-table --table-name $OPTIONS_TABLE --region $AWS_REGION 2>/dev/null || \
          aws dynamodb create-table \
            --table-name $OPTIONS_TABLE \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $AWS_REGION

      - name: Install Lambda dependencies
        run: |
          cd lambda
          npm install --omit=dev

      - name: Package Lambda
        run: |
          cd lambda
          zip -r ../lambda.zip . -x "*.git*"

      - name: Get or create Lambda role ARN
        id: role
        run: |
          ROLE_NAME=op-investing-guru-lambda-role
          ROLE_ARN=$(aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text 2>/dev/null) || true
          if [ -z "$ROLE_ARN" ] || [ "$ROLE_ARN" = "None" ]; then
            TRUST='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
            ROLE_ARN=$(aws iam create-role --role-name $ROLE_NAME \
              --assume-role-policy-document "$TRUST" \
              --query 'Role.Arn' --output text)
            aws iam attach-role-policy --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            aws iam attach-role-policy --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
            echo "Waiting for role propagation..."
            sleep 15
          fi
          echo "arn=$ROLE_ARN" >> $GITHUB_OUTPUT

      - name: Deploy Lambda
        run: |
          EXISTING=$(aws lambda get-function --function-name $LAMBDA_NAME --region $AWS_REGION 2>/dev/null) || true
          if [ -z "$EXISTING" ]; then
            aws lambda create-function \
              --function-name $LAMBDA_NAME \
              --runtime nodejs22.x \
              --role ${{ steps.role.outputs.arn }} \
              --handler index.handler \
              --zip-file fileb://lambda.zip \
              --timeout 30 \
              --memory-size 256 \
              --region $AWS_REGION
          else
            aws lambda update-function-code \
              --function-name $LAMBDA_NAME \
              --zip-file fileb://lambda.zip \
              --region $AWS_REGION
            aws lambda wait function-updated \
              --function-name $LAMBDA_NAME \
              --region $AWS_REGION
          fi

      - name: Add Lambda resource policy for API Gateway
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission \
            --function-name $LAMBDA_NAME \
            --statement-id apigateway-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:$AWS_REGION:$ACCOUNT_ID:*" \
            --region $AWS_REGION 2>/dev/null || true

      - name: Create or update API Gateway
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LAMBDA_ARN="arn:aws:lambda:$AWS_REGION:$ACCOUNT_ID:function:$LAMBDA_NAME"

          API_ID=$(aws apigatewayv2 get-apis --region $AWS_REGION \
            --query "Items[?Name=='$API_NAME'].ApiId" --output text 2>/dev/null)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigatewayv2 create-api \
              --name $API_NAME \
              --protocol-type HTTP \
              --cors-configuration AllowOrigins="*",AllowMethods="GET,PUT,PATCH,POST,DELETE,OPTIONS",AllowHeaders="Content-Type,Authorization" \
              --region $AWS_REGION \
              --query 'ApiId' --output text)

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id $API_ID \
              --integration-type AWS_PROXY \
              --integration-uri $LAMBDA_ARN \
              --payload-format-version 2.0 \
              --region $AWS_REGION \
              --query 'IntegrationId' --output text)

            aws apigatewayv2 create-route \
              --api-id $API_ID \
              --route-key '$default' \
              --target integrations/$INTEGRATION_ID \
              --region $AWS_REGION

            aws apigatewayv2 create-stage \
              --api-id $API_ID \
              --stage-name '$default' \
              --auto-deploy \
              --region $AWS_REGION

            echo "API URL: https://$API_ID.execute-api.$AWS_REGION.amazonaws.com"
          else
            echo "API Gateway already exists: $API_ID"
          fi
